# =============================================================================
#                           TMUX Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Terminal Settings
# -----------------------------------------------------------------------------
set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -sa terminal-overrides ',xterm-256color:RGB'

# Enable focus events for vim integration
set -g focus-events on

# Enable mouse support
set -g mouse on

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------
set -g base-index 1              # Start window numbering at 1
setw -g pane-base-index 1        # Start pane numbering at 1
set -s escape-time 0             # No delay for escape key
set -g history-limit 250000      # Increase scrollback buffer
set -g display-time 2000         # Message display time (ms)
set -g display-panes-time 3000   # Pane display time (ms)
set -g renumber-windows on       # Renumber windows on close
set -g set-clipboard on          # Enable clipboard integration

# -----------------------------------------------------------------------------
# Vi Mode
# -----------------------------------------------------------------------------
set-window-option -g mode-keys vi

# -----------------------------------------------------------------------------
# Status Bar
# -----------------------------------------------------------------------------
set -g status-style bg=colour237,fg=colour223
set -g status-left ''
set -g status-right '#[fg=colour246] %Y-%m-%d #[fg=colour109]%H:%M '
set -g status-right-length 50
setw -g window-status-current-format '#[fg=colour214,bg=colour237,bold] #I:#W#F '
setw -g window-status-format '#[fg=colour246,bg=colour237] #I:#W#F '
set -g window-status-separator ''

# Pane borders
set -g pane-border-style fg=colour239
set -g pane-active-border-style fg=colour214

# -----------------------------------------------------------------------------
# Keybindings
# -----------------------------------------------------------------------------
source-file ~/dotfiles/tmux/tmux-keybindings.conf

# -----------------------------------------------------------------------------
# Plugins (TPM)
# -----------------------------------------------------------------------------
# NOTE: vim-tmux-navigator bindings are defined inline in tmux-keybindings.conf
# To re-enable TPM, clone it and uncomment below:
#   git clone https://github.com/tmux-plugins/tpm ~/dotfiles/tmux/plugins/tpm
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-yank'
# set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/dotfiles/tmux/plugins'
# run '~/dotfiles/tmux/plugins/tpm/tpm'
